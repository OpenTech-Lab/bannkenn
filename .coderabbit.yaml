# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# CodeRabbit Configuration
language: "en-US"
tone_instructions: >
  Focus on performance, security, and adherence to clean code principles.

reviews:
  # High-level summary of changes
  high_level_summary: true
  # Profile can be 'assertive' or 'chill'
  profile: assertive
  
  # Fine-tune which files should be ignored
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/*.lock"
    - "!**/vendor/**"

  auto_review:
    # Disable automatic reviews on every push/PR
    enabled: false

chat:
  # Keeps the chat feature active without requiring a mention.
  auto_reply: true

# BannKenn nginx TLS example for the current host-network Docker deployment
# without a domain name.
#
# The compose file runs:
#   server    -> 127.0.0.1:3022
#   dashboard -> 127.0.0.1:3021
#
# Because the dashboard itself exposes /api/* routes, do not try to share one
# public IP/port between both services with a path split. Use separate external
# TLS ports instead:
#   https://SERVER_IP:1234 -> BannKenn server API
#   https://SERVER_IP:1235 -> BannKenn dashboard UI
#
# Generate one certificate with the server IP in the SAN extension, or use a
# private CA and install that CA into every agent/browser that must trust it.
# The same certificate can be reused for both TLS ports because they terminate
# on the same server IP.

events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream bannkenn_api {
        server 127.0.0.1:3022;
        keepalive 16;
    }

    upstream bannkenn_dashboard {
        server 127.0.0.1:3021;
        keepalive 16;
    }

    server {
        listen 1234 ssl;
        http2 on;
        server_name _;

        ssl_certificate /etc/nginx/ssl/bannkenn.crt;
        ssl_certificate_key /etc/nginx/ssl/bannkenn.key;

        location / {
            proxy_pass http://bannkenn_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    server {
        listen 1235 ssl;
        http2 on;
        server_name _;

        ssl_certificate /etc/nginx/ssl/bannkenn.crt;
        ssl_certificate_key /etc/nginx/ssl/bannkenn.key;

        location / {
            proxy_pass http://bannkenn_dashboard;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
